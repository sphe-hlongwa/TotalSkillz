[build]
  publish = "public"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---- Security Headers ----
# Applied to every response served by Netlify Hosting.
# Express/Helmet headers only protect traffic routed through the Express server;
# these headers protect the static app served directly by Netlify CDN.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security         = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options            = "nosniff"
    Referrer-Policy                   = "strict-origin-when-cross-origin"
    Permissions-Policy                = "camera=(), microphone=(), geolocation=(), payment=()"
    Cross-Origin-Opener-Policy        = "same-origin"
    # script-src: 'unsafe-inline' is kept as temporary tech debt until all inline
    # event handlers and inline <script> blocks are migrated to external JS files.
    Content-Security-Policy           = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://www.gstatic.com https://*.googleapis.com https://*.googleusercontent.com https://res.cloudinary.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://totalskillz.web.app https://totalskillz-7193a.web.app https://api.cloudinary.com https://www.gstatic.com; frame-src 'self' https://*.firebaseapp.com https://www.google.com/recaptcha/ https://totalskillz.firebaseapp.com https://totalskillz-7193a.firebaseapp.com https://www.youtube.com https://www.youtube-nocookie.com"
