    <script>
        if (!requireAuth()) throw 'Not authed';

        // ---- Question Bank with LaTeX ----
        const questionBank = [
            // Algebra
            {
                topic: 'algebra',
                q: 'Solve for \\(x\\) if \\(x^2 - 5x - 2 = 0\\). Leave your answer in simplest surd form.',
                options: ['\\(x = \\frac{5 \\pm \\sqrt{33}}{2}\\)', '\\(x = \\frac{-5 \\pm \\sqrt{33}}{2}\\)', '\\(x = \\frac{5 \\pm \\sqrt{17}}{2}\\)', '\\(x = 5 \\pm \\sqrt{33}\\)'],
                answer: 0,
                solution: [
                    'Use the quadratic formula: \\(x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}\\)',
                    'Substitute \\(a=1, b=-5, c=-2\\):',
                    '\\(x = \\frac{-(-5) \\pm \\sqrt{(-5)^2 - 4(1)(-2)}}{2(1)}\\)',
                    '\\(x = \\frac{5 \\pm \\sqrt{25 + 8}}{2}\\)',
                    '\\(x = \\frac{5 \\pm \\sqrt{33}}{2}\\)'
                ]
            },
            {
                topic: 'algebra',
                q: 'Calculate the value of \\(\\sum_{k=1}^{50} (2k - 1)\\)',
                options: ['\\(2500\\)', '\\(5000\\)', '\\(2550\\)', '\\(2450\\)'],
                answer: 0,
                solution: [
                    'This is an arithmetic series where \\(T_k = 2k - 1\\).',
                    'First term \\(a = 2(1) - 1 = 1\\)',
                    'Last term \\(l = T_{50} = 2(50) - 1 = 99\\)',
                    'Number of terms \\(n = 50 - 1 + 1 = 50\\)',
                    '\\(S_n = \\frac{n}{2}(a + l)\\)',
                    '\\(S_{50} = \\frac{50}{2}(1 + 99) = 25(100) = 2500\\)'
                ]
            },
            {
                topic: 'algebra',
                q: 'Solve the inequality: \\(x^2 - 4x > 5\\)',
                options: ['\\(x < -1\\) or \\(x > 5\\)', '\\(-1 < x < 5\\)', '\\(x < -5\\) or \\(x > 1\\)', '\\(-5 < x < 1\\)'],
                answer: 0,
                solution: [
                    'Rearrange to standard form: \\(x^2 - 4x - 5 > 0\\)',
                    'Factorise: \\((x - 5)(x + 1) > 0\\)',
                    'Critical values are \\(x = 5\\) and \\(x = -1\\)',
                    'Since it is \\(> 0\\), the solution is outside the roots:',
                    '\\(x < -1\\) or \\(x > 5\\)'
                ]
            },
            {
                topic: 'algebra',
                q: 'The first three terms of a geometric sequence are \\(x\\), \\(x+2\\), and \\(x+6\\). Determine the value of \\(x\\).',
                options: ['\\(x = 2\\)', '\\(x = -2\\)', '\\(x = 4\\)', '\\(x = -4\\)'],
                answer: 0,
                solution: [
                    'For a geometric sequence, the common ratio is constant: \\(\\frac{T_2}{T_1} = \\frac{T_3}{T_2}\\)',
                    '\\(\\frac{x+2}{x} = \\frac{x+6}{x+2}\\)',
                    'Cross-multiply: \\((x+2)^2 = x(x+6)\\)',
                    '\\(x^2 + 4x + 4 = x^2 + 6x\\)',
                    '\\(4 = 2x \\implies x = 2\\)'
                ]
            },

            // Functions
            {
                topic: 'functions',
                q: 'Given \\(f(x) = \\frac{2}{x-3} + 1\\), what are the equations of the asymptotes?',
                options: ['\\(x = 3\\) and \\(y = 1\\)', '\\(x = -3\\) and \\(y = 1\\)', '\\(x = 3\\) and \\(y = -1\\)', '\\(x = -3\\) and \\(y = -1\\)'],
                answer: 0,
                solution: [
                    'The vertical asymptote is where the denominator is zero: \\(x - 3 = 0 \\implies x = 3\\)',
                    'The horizontal asymptote is given by the constant term: \\(y = 1\\)',
                    'Thus, the asymptotes are \\(x = 3\\) and \\(y = 1\\)'
                ]
            },
            {
                topic: 'functions',
                q: 'Find the inverse function \\(f^{-1}(x)\\) if \\(f(x) = 3^x\\)',
                options: ['\\(f^{-1}(x) = \\log_3(x)\\)', '\\(f^{-1}(x) = 3^{-x}\\)', '\\(f^{-1}(x) = \\frac{1}{3^x}\\)', '\\(f^{-1}(x) = x^3\\)'],
                answer: 0,
                solution: [
                    'Let \\(y = 3^x\\)',
                    'Swap \\(x\\) and \\(y\\) to find the inverse: \\(x = 3^y\\)',
                    'Convert from exponential to logarithmic form:',
                    '\\(y = \\log_3(x)\\)',
                    'Therefore, \\(f^{-1}(x) = \\log_3(x)\\)'
                ]
            },
            {
                topic: 'functions',
                q: 'Given the parabola \\(g(x) = -2(x-1)^2 + 8\\), identify the coordinates of the turning point.',
                options: ['\\((1, 8)\\)', '\\((-1, 8)\\)', '\\((1, -8)\\)', '\\((-2, 8)\\)'],
                answer: 0,
                solution: [
                    'The equation is in vertex form: \\(y = a(x-p)^2 + q\\)',
                    'The turning point is \\((p, q)\\).',
                    'By comparison, \\(p = 1\\) and \\(q = 8\\).',
                    'The turning point is \\((1, 8)\\).'
                ]
            },
            {
                topic: 'functions',
                q: 'If \\(h(x) = 2x^2 - 4x - 6\\), find the x-intercepts of the graph.',
                options: ['\\(x = 3\\) or \\(x = -1\\)', '\\(x = -3\\) or \\(x = 1\\)', '\\(x = 6\\) or \\(x = -1\\)', '\\(x = 2\\) or \\(x = -3\\)'],
                answer: 0,
                solution: [
                    'Set \\(h(x) = 0\\): \\(2x^2 - 4x - 6 = 0\\)',
                    'Divide by 2: \\(x^2 - 2x - 3 = 0\\)',
                    'Factorise: \\((x - 3)(x + 1) = 0\\)',
                    '\\(x = 3\\) or \\(x = -1\\)'
                ]
            },

            // Trigonometry
            {
                topic: 'trigonometry',
                q: 'Simplify fully: \\(\\frac{\\sin(180^\\circ - x) \\cdot \\cos(360^\\circ - x)}{\\sin(90^\\circ - x)}\\)',
                options: ['\\(\\sin x\\)', '\\(-\\sin x\\)', '\\(\\cos x\\)', '\\(\\tan x\\)'],
                answer: 0,
                solution: [
                    'Use reduction formulae:',
                    '\\(\\sin(180^\\circ - x) = \\sin x\\) (2nd quadrant, positive)',
                    '\\(\\cos(360^\\circ - x) = \\cos x\\) (4th quadrant, positive)',
                    '\\(\\sin(90^\\circ - x) = \\cos x\\) (co-function)',
                    'Substitute: \\(\\frac{\\sin x \\cdot \\cos x}{\\cos x}\\)',
                    'Cancel \\(\\cos x\\) to get \\(\\sin x\\)'
                ]
            },
            {
                topic: 'trigonometry',
                q: 'Which expression is equivalent to \\(\\cos 2x\\)?',
                options: ['\\(2\\cos^2 x - 1\\)', '\\(2\\sin^2 x - 1\\)', '\\(\\cos^2 x + \\sin^2 x\\)', '\\(2\\sin x \\cos x\\)'],
                answer: 0,
                solution: [
                    'The double angle identity for cosine has 3 forms:',
                    '1) \\(\\cos^2 x - \\sin^2 x\\)',
                    '2) \\(2\\cos^2 x - 1\\)',
                    '3) \\(1 - 2\\sin^2 x\\)',
                    'The correct option corresponding to form 2 is \\(2\\cos^2 x - 1\\).'
                ]
            },
            {
                topic: 'trigonometry',
                q: 'If \\(\\tan \\theta = \\frac{3}{4}\\) and \\(\\theta \\in [180^\\circ; 360^\\circ]\\), determine \\(\\sin \\theta\\) without a calculator.',
                options: ['\\(-\\frac{3}{5}\\)', '\\(\\frac{3}{5}\\)', '\\(-\\frac{4}{5}\\)', '\\(\\frac{4}{5}\\)'],
                answer: 0,
                solution: [
                    'Tangent is positive in Q3. Given domain restricts to Q3 or Q4, so \\(\\theta\\) is in Q3.',
                    'In Q3, \\(x = -4\\) and \\(y = -3\\)',
                    '\\(r^2 = x^2 + y^2 = (-4)^2 + (-3)^2 = 25 \\implies r = 5\\)',
                    '\\(\\sin \\theta = \\frac{y}{r} = \\frac{-3}{5}\\)',
                    'Therefore, \\(\\sin \\theta = -\\frac{3}{5}\\)'
                ]
            },
            {
                topic: 'trigonometry',
                q: 'Solve for \\(x\\) if \\(\\sin 2x = \\cos(x - 30^\\circ)\\)',
                options: ['\\(x = 40^\\circ + k \\cdot 120^\\circ\\) or \\(x = 60^\\circ + k \\cdot 360^\\circ\\)', '\\(x = 20^\\circ + k \\cdot 120^\\circ\\)', '\\(x = 60^\\circ + k \\cdot 180^\\circ\\)', '\\(x = 40^\\circ + k \\cdot 360^\\circ\\)'],
                answer: 0,
                solution: [
                    'Use co-functions: \\(\\sin 2x = \\sin(90^\\circ - (x - 30^\\circ))\\)',
                    '\\(\\sin 2x = \\sin(120^\\circ - x)\\)',
                    'General solution part 1: \\(2x = 120^\\circ - x + k \\cdot 360^\\circ\\)',
                    '\\(3x = 120^\\circ + k \\cdot 360^\\circ \\implies x = 40^\\circ + k \\cdot 120^\\circ\\)',
                    'General solution part 2: \\(2x = 180^\\circ - (120^\\circ - x) + k \\cdot 360^\\circ\\)',
                    '\\(2x = 60^\\circ + x + k \\cdot 360^\\circ \\implies x = 60^\\circ + k \\cdot 360^\\circ\\)'
                ]
            },

            // Calculus
            {
                topic: 'calculus',
                q: 'Determine \\(f\'(x)\\) from first principles if \\(f(x) = 3x^2\\). The limit definition step is:',
                options: ['\\(\\lim_{h \\to 0} \\frac{3(x+h)^2 - 3x^2}{h}\\)', '\\(\\lim_{h \\to 0} \\frac{(3x+h)^2 - 3x^2}{h}\\)', '\\(\\frac{3(x+h)^2 - 3x^2}{h}\\)', '\\(\\lim_{x \\to 0} \\frac{3(x+h)^2 - 3x^2}{h}\\)'],
                answer: 0,
                solution: [
                    'First principles formula: \\(f\'(x) = \\lim_{h \\to 0} \\frac{f(x+h) - f(x)}{h}\\)',
                    'Substitute \\(f(x) = 3x^2\\):',
                    '\\(f(x+h) = 3(x+h)^2\\)',
                    'Thus, \\(f\'(x) = \\lim_{h \\to 0} \\frac{3(x+h)^2 - 3x^2}{h}\\)'
                ]
            },
            {
                topic: 'calculus',
                q: 'Determine \\(\\frac{dy}{dx}\\) if \\(y = \\frac{2}{x^3} - \\sqrt{x}\\)',
                options: ['\\(-6x^{-4} - \\frac{1}{2}x^{-1/2}\\)', '\\(6x^{-4} - \\frac{1}{2}x^{-1/2}\\)', '\\(-6x^{-2} - 2x^{1/2}\\)', '\\(-2x^{-4} - \\frac{1}{2}x^{-1/2}\\)'],
                answer: 0,
                solution: [
                    'Convert to exponent form: \\(y = 2x^{-3} - x^{1/2}\\)',
                    'Apply the power rule: \\(\\frac{d}{dx} x^n = n x^{n-1}\\)',
                    '\\(\\frac{dy}{dx} = 2(-3)x^{-3-1} - \\frac{1}{2}x^{1/2 - 1}\\)',
                    '\\(\\frac{dy}{dx} = -6x^{-4} - \\frac{1}{2}x^{-1/2}\\)'
                ]
            },
            {
                topic: 'calculus',
                q: 'Given \\(f(x) = x^3 - 3x^2\\), find the x-coordinates of the stationary points.',
                options: ['\\(x = 0\\) and \\(x = 2\\)', '\\(x = 0\\) and \\(x = 3\\)', '\\(x = 1\\) and \\(x = 2\\)', '\\(x = -2\\) and \\(x = 0\\)'],
                answer: 0,
                solution: [
                    'Stationary points occur where \\(f\'(x) = 0\\)',
                    'Differentiate: \\(f\'(x) = 3x^2 - 6x\\)',
                    'Set to zero: \\(3x^2 - 6x = 0\\)',
                    'Factorise: \\(3x(x - 2) = 0\\)',
                    'Therefore, \\(x = 0\\) or \\(x = 2\\)'
                ]
            },
            {
                topic: 'calculus',
                q: 'The volume of a box is given by \\(V(x) = 4x^3 - 48x^2 + 144x\\). Find the value of \\(x\\) that maximises the volume, where \\(0 < x < 6\\).',
                options: ['\\(x = 2\\)', '\\(x = 6\\)', '\\(x = 3\\)', '\\(x = 4\\)'],
                answer: 0,
                solution: [
                    'Find the derivative: \\(V\'(x) = 12x^2 - 96x + 144\\)',
                    'Set \\(V\'(x) = 0\\) for maximum: \\(12(x^2 - 8x + 12) = 0\\)',
                    'Factorise: \\((x - 2)(x - 6) = 0\\)',
                    'Since the domain is \\(0 < x < 6\\), \\(x = 6\\) is invalid.',
                    'The value that maximises the volume is \\(x = 2\\).'
                ]
            },

            // Geometry
            {
                topic: 'geometry',
                q: 'The equation of a circle is \\(x^2 + y^2 - 4x + 6y - 12 = 0\\). Find the coordinates of the centre.',
                options: ['\\((2, -3)\\)', '\\((-2, 3)\\)', '\\((4, -6)\\)', '\\((-4, 6)\\)'],
                answer: 0,
                solution: [
                    'Group terms: \\((x^2 - 4x) + (y^2 + 6y) = 12\\)',
                    'Complete the square: \\((x^2 - 4x + 4) + (y^2 + 6y + 9) = 12 + 4 + 9\\)',
                    '\\((x - 2)^2 + (y + 3)^2 = 25\\)',
                    'The equation is in form \\((x - a)^2 + (y - b)^2 = r^2\\)',
                    'The centre is \\((2, -3)\\).'
                ]
            },
            {
                topic: 'geometry',
                q: 'Two triangles, \\(\\Delta ABC\\) and \\(\\Delta DEF\\), are similar. The area of \\(\\Delta ABC\\) is 20 and the ratio of their corresponding sides is \\(\\frac{AB}{DE} = \\frac{1}{2}\\). What is the area of \\(\\Delta DEF\\)?',
                options: ['\\(80\\)', '\\(40\\)', '\\(10\\)', '\\(100\\)'],
                answer: 0,
                solution: [
                    'For similar triangles, the ratio of their areas is the square of the ratio of their sides.',
                    '\\(\\frac{\\text{Area } \\Delta ABC}{\\text{Area } \\Delta DEF} = \\left(\\frac{AB}{DE}\\right)^2\\)',
                    '\\(\\frac{20}{\\text{Area } \\Delta DEF} = \\left(\\frac{1}{2}\\right)^2 = \\frac{1}{4}\\)',
                    '\\(\\text{Area } \\Delta DEF = 20 \\times 4 = 80\\)'
                ]
            },
            {
                topic: 'geometry',
                q: 'Find the equation of the tangent to the circle \\(x^2 + y^2 = 25\\) at the point \\((3, 4)\\).',
                options: ['\\(y = -\\frac{3}{4}x + \\frac{25}{4}\\)', '\\(y = \\frac{3}{4}x + \\frac{7}{4}\\)', '\\(y = -\\frac{4}{3}x + 8\\)', '\\(y = \\frac{4}{3}x\\)'],
                answer: 0,
                solution: [
                    'The centre of the circle is \\((0, 0)\\).',
                    'Gradient of radius \\(m_{rad} = \\frac{4 - 0}{3 - 0} = \\frac{4}{3}\\)',
                    'Tangent is perpendicular to radius, so \\(m_{tan} = -\\frac{3}{4}\\)',
                    'Equation of tangent: \\(y - y_1 = m(x - x_1)\\)',
                    '\\(y - 4 = -\\frac{3}{4}(x - 3)\\)',
                    '\\(y = -\\frac{3}{4}x + \\frac{9}{4} + \\frac{16}{4} = -\\frac{3}{4}x + \\frac{25}{4}\\)'
                ]
            },
            {
                topic: 'geometry',
                q: 'In a cyclic quadrilateral \\(ABCD\\), angle \\(A = 3x\\) and angle \\(C = 2x\\). What is the value of \\(x\\)?',
                options: ['\\(36^\\circ\\)', '\\(72^\\circ\\)', '\\(18^\\circ\\)', '\\(54^\\circ\\)'],
                answer: 0,
                solution: [
                    'Opposite angles of a cyclic quadrilateral are supplementary (add up to \\(180^\\circ\\)).',
                    '\\(A + C = 180^\\circ\\)',
                    '\\(3x + 2x = 180^\\circ\\)',
                    '\\(5x = 180^\\circ\\)',
                    '\\(x = 36^\\circ\\)'
                ]
            },

            // Probability
            {
                topic: 'probability',
                q: 'A 4-digit PIN is made using digits 0-9. How many PINs are possible if digits can be repeated?',
                options: ['\\(10\\,000\\)', '\\(5\\,040\\)', '\\(9\\,000\\)', '\\(10\\)'],
                answer: 0,
                solution: [
                    'There are 10 choices for each of the 4 positions.',
                    'Using the fundamental counting principle:',
                    'Total combinations = \\(10 \\times 10 \\times 10 \\times 10 = 10\\,000\\)'
                ]
            },
            {
                topic: 'probability',
                q: 'Events A and B are mutually exclusive. If \\(P(A) = 0,4\\) and \\(P(A \\cup B) = 0,7\\), find \\(P(B)\\).',
                options: ['\\(0,3\\)', '\\(0,28\\)', '\\(1,1\\)', '\\(0,12\\)'],
                answer: 0,
                solution: [
                    'For mutually exclusive events, \\(P(A \\cap B) = 0\\).',
                    'The addition rule is \\(P(A \\cup B) = P(A) + P(B) - P(A \\cap B)\\)',
                    'Substitute the given values:',
                    '\\(0,7 = 0,4 + P(B) - 0\\)',
                    '\\(P(B) = 0,7 - 0,4 = 0,3\\)'
                ]
            },
            {
                topic: 'probability',
                q: 'How many different arrangements can be made from the letters of the word "SUCCESS"?',
                options: ['\\(420\\)', '\\(5\\,040\\)', '\\(840\\)', '\\(210\\)'],
                answer: 0,
                solution: [
                    'The word "SUCCESS" has 7 letters.',
                    'There are repeating letters: 3 S\'s and 2 C\'s.',
                    'The number of arrangements is \\(\\frac{n!}{n_1! \\times n_2! \\times ...}\\)',
                    '\\(\\frac{7!}{3! \\times 2!} = \\frac{5040}{6 \\times 2} = \\frac{5040}{12}\\)',
                    '\\(= 420\\)'
                ]
            },
            {
                topic: 'probability',
                q: 'A bag contains 5 red balls and 3 blue balls. A ball is drawn and NOT replaced. Then a second ball is drawn. What is the probability that both are red?',
                options: ['\\(\\frac{5}{14}\\)', '\\(\\frac{25}{64}\\)', '\\(\\frac{5}{28}\\)', '\\(\\frac{10}{27}\\)'],
                answer: 0,
                solution: [
                    'P(First is red) = \\(\\frac{5}{8}\\)',
                    'Since there is NO replacement, there are now 4 red balls out of 7 total.',
                    'P(Second is red | First was red) = \\(\\frac{4}{7}\\)',
                    'P(Both red) = \\(\\frac{5}{8} \\times \\frac{4}{7} = \\frac{20}{56}\\)',
                    'Simplify the fraction: \\(\\frac{20}{56} = \\frac{5}{14}\\)'
                ]
            },
            // --- NEW QUESTIONS ---
            // Algebra
            {
                topic: 'algebra',
                q: 'Solve for \\(x\\) and \\(y\\) simultaneously: \\(3x - y = 1\\) and \\(x^2 + xy - y^2 = -1\\)',
                options: ['\\(x = 0, y = -1\\) or \\(x = \\frac{2}{5}, y = \\frac{1}{5}\\)', '\\(x = 1, y = 2\\) or \\(x = 0, y = -1\\)', '\\(x = -1, y = -4\\)', '\\(x = 0, y = 1\\)'],
                answer: 0,
                solution: [
                    'From \\(3x - y = 1\\), express \\(y\\) in terms of \\(x\\): \\(y = 3x - 1\\)',
                    'Substitute into the second equation: \\(x^2 + x(3x - 1) - (3x - 1)^2 = -1\\)',

            questionIndex = 0;

            pill.addEventListener('click', () => {
                document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));

                currentTopic = pill.dataset.topic;
                sessionCorrect = 0; sessionTotal = 0;
                filterQuestions(); renderQuestion();
            });
        });

        const urlParams = new URLSearchParams(window.location.search);
        const topicParam = urlParams.get('topic');
        if (topicParam) {
            currentTopic = topicParam;
            document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.topic === topicParam));
        }

        function renderQuestion() {
            const area = document.getElementById('questionArea');
            if (questionIndex >= filteredQuestions.length) { renderSummary(); return; }

            const letters = ['A', 'B', 'C', 'D'];
            const topicNames = { algebra: 'Algebra', functions: 'Functions', trigonometry: 'Trigonometry', calculus: 'Calculus', geometry: 'Geometry', probability: 'Probability' };

        function checkAnswer(selected, q) {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach((btn, i) => { btn.style.pointerEvents = 'none'; if (i === q.answer) btn.classList.add('correct'); if (i === selected && i !== q.answer) btn.classList.add('wrong'); });
            sessionTotal++;
            if (selected === q.answer) {
                sessionCorrect++;
            } else {
                failedQuestions.push(q);
            }
            recordAnswer(q.topic, selected === q.answer);
            document.getElementById('showSolution').style.display = '';
            document.getElementById('nextBtn').style.display = '';
            showToast(selected === q.answer ? 'Correct!' : 'Incorrect. Review the solution.', selected === q.answer ? 'success' : 'error');
            updateSessionDisplay(); renderTopicBreakdown(); checkSuggestions();
        }

        function nextQuestion() { questionIndex++; renderQuestion(); }
        function updateSessionDisplay() { document.getElementById('sessionScore').textContent = sessionCorrect + ' / ' + sessionTotal; }

            const topicNames = { algebra: 'Algebra', functions: 'Functions', trigonometry: 'Trig', calculus: 'Calculus', geometry: 'Geometry', probability: 'Probability' };
            container.innerHTML = Object.entries(progress.topics).map(([key, t]) => {
                const pct = t.total > 0 ? Math.round((t.correct / t.total) * 100) : 0;
                const barClass = pct >= 70 ? 'progress-bar-green' : pct >= 40 ? 'progress-bar-amber' : '';
                return `<div class="topic-row"><span class="topic-row__label">${topicNames[key]}</span><div class="topic-row__bar"><div class="progress"><div class="progress-bar ${barClass}" style="width:${pct}%;"></div></div></div><span class="topic-row__pct">${pct}%</span></div>`;

        }

                    summaryHTML += `
                    <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem;">
                        <div style="font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem;">
                            Question ${idx + 1} <span style="font-size: 0.8rem; padding: 0.2rem 0.5rem; background: var(--bg-elevated); border-radius: var(--radius-sm); margin-left: 0.5rem;">${q.topic}</span>
                        </div>
                        <div style="margin-bottom: 1rem; color: var(--text);">${q.q}</div>
                        <div style="margin-bottom: 1rem; font-size: 0.95rem;">
                            <span style="color: var(--accent-green);"><i class="fa-solid fa-check"></i> Correct Answer:</span> ${q.options[q.answer]}
                        </div>
                        <div class="solution-box visible" style="display: block; margin-top: 0;">
                            <div class="solution-box__title"><i class="fa-solid fa-lightbulb"></i> Step-by-Step Solution</div>
                            <div class="solution-box__steps">
                                ${q.solution.map(s => '<div class="step">' + s + '</div>').join('')}
                            </div>
                        </div>
                    </div>`;
                });

                summaryHTML += `</div></div>`;
            }

            document.getElementById('questionArea').innerHTML = summaryHTML;
            renderMath(document.getElementById('questionArea'));
        }

        function resetSession() { sessionCorrect = 0; sessionTotal = 0; failedQuestions = []; filterQuestions(); renderQuestion(); }

        filterQuestions(); renderQuestion(); renderTopicBreakdown();
    </script>
</body>

</html>
