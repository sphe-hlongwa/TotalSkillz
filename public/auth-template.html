<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH PAGE TITLE - Total Skill</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Core styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body data-theme="dark">
    <!-- ============================================================
         STRUCTURE GUARD — Read before editing this file!
         ============================================================
         Required nesting order (do NOT reorder or remove these):
         
           [1] .auth-page             — primary grid container (2 columns)
               [1a] .auth-visual      — left panel (formulas & logo)
               [1b] .auth-form-section — right panel (contains form wraps)
                   [1c] .auth-form-wrap — container for specific forms
         
         CRITICAL UI PATTERNS:
         - Password fields MUST be inside .password-wrap for correct icon alignment.
         - Eye icons MUST have the .password-toggle class.
         - Segmented controls MUST use .auth-tabs > .auth-tab.active.
         ============================================================ -->

    <div class="auth-page">
        <!-- Left Panel: Visual/Marketing -->
        <div class="auth-visual">
            <div class="auth-visual__content">
                <div class="auth-visual__icon">
                    <img src="logo.jpg" alt="Logo">
                </div>
                <h1 class="auth-visual__title">Total Skill</h1>
                <p class="auth-visual__desc">Master Grade 12 Mathematics.</p>
                <div class="auth-visual__formulas">
                    <span class="formula-chip" style="--i:1;">\( formula_1 \)</span>
                    <span class="formula-chip" style="--i:2;">\( formula_2 \)</span>
                </div>
            </div>
        </div>

        <!-- Right Panel: Forms -->
        <div class="auth-form-section">
            <div class="auth-form-wrap" id="mainPanel">
                <div class="auth-form__header">
                    <h2 class="auth-form__title">Welcome</h2>
                    <p class="auth-form__subtitle">Please enter your details</p>
                </div>

                <!-- Google/Social Auth -->
                <button class="btn-google" type="button">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Continue with Google
                </button>

                <div class="auth-tabs">
                    <button type="button" class="auth-tab active">Method 1</button>
                    <button type="button" class="auth-tab">Method 2</button>
                </div>

                <form id="exampleForm" novalidate>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" placeholder="you@email.com" required>
                        <div class="form-error">Error message here</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-wrap">
                            <input type="password" class="form-input" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye password-toggle"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">
                        Submit <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase + App Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
