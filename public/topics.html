    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <script>
        const topicsMeta = {
            algebra: { title: 'Algebra, Equations & Inequalities', desc: 'Quadratic equations, surds, inequalities & simultaneous equations', icon: 'fa-solid fa-superscript', color: '#4f46e5', lessons: [{ title: 'Solving Quadratic Equations', formula: { tex: '\\[ x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a} \\]', label: 'Quadratic Formula' }, explanation: 'A quadratic equation is in the form \\(ax^2 + bx + c = 0\\). Solve by factorising, completing the square, or using the quadratic formula.', visual: `<svg viewBox="0 0 400 250" width="400" height="250"><defs><linearGradient id="gA" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#4f46e520" /><stop offset="100%" stop-color="#4f46e500" /></linearGradient></defs><line x1="40" y1="210" x2="380" y2="210" stroke="var(--text-muted)" stroke-width="1.5" /><line x1="40" y1="20" x2="40" y2="210" stroke="var(--text-muted)" stroke-width="1.5" /><text x="385" y="215" font-size="12" fill="var(--text-muted)">x</text><text x="30" y="15" font-size="12" fill="var(--text-muted)">y</text><path d="M60,190 Q130,10 200,80 Q270,150 340,20" fill="none" stroke="#4f46e5" stroke-width="2.5" /><path d="M60,190 Q130,10 200,80 Q270,150 340,20 L340,210 L60,210 Z" fill="url(#gA)" /><circle cx="120" cy="210" r="5" fill="#ef4444" /><text x="105" y="232" font-size="11" fill="#ef4444" font-weight="600">x&#8321;</text><circle cx="300" cy="210" r="5" fill="#ef4444" /><text x="285" y="232" font-size="11" fill="#ef4444" font-weight="600">x&#8322;</text><circle cx="200" cy="80" r="5" fill="#4f46e5" /><text x="208" y="75" font-size="11" fill="#4f46e5" font-weight="600">vertex</text></svg>`, steps: ['Transpose the equation to equal zero: \\(ax^2 + bx + c = 0\\)', 'Calculate discriminant: \\(\\Delta = b^2 - 4ac\\) to determine nature of roots.', 'If \\(\\Delta > 0\\) (two roots), \\(\\Delta = 0\\) (one root), \\(\\Delta < 0\\) (no real roots)', 'Substitute into the quadratic formula to find values for \\(x\\)'] }] },
            patterns: { title: 'Number Patterns', desc: 'Arithmetic & Geometric Sequences and Series.', icon: 'fa-solid fa-list-ol', color: '#0ea5e9', lessons: [{ title: 'Arithmetic Sequences & Series', formula: { tex: '\\[ S_n = \\frac{n}{2}[2a + (n-1)d] \\]', label: 'Sum of an arithmetic series' }, explanation: 'An arithmetic sequence adds or subtracts a constant difference (\\(d\\)) between consecutive terms.', steps: ['Identify first term \\(a\\) and common difference \\(d = T_2 - T_1\\).', 'General term is \\(T_n = a + (n-1)d\\).', 'Sum formula: \\(S_n = \\frac{n}{2}[2a + (n-1)d]\\)'] }] },
            functions: { title: 'Functions & Graphs', desc: 'Parabolas, hyperbolas, exp curves, and inverses.', icon: 'fa-solid fa-chart-line', color: '#10b981', lessons: [{ title: 'The Parabola & Inverse', formula: { tex: '\\[ y = a(x - p)^2 + q \\]', label: 'Turning point form' }, explanation: 'A U-shaped curve. The inverse is formed by swapping \\(x\\) and \\(y\\).', steps: ['Turning point is at \\((p, q)\\).', 'To find inverse: Swap \\(x\\) and \\(y\\) and solve for \\(y\\).'] }] },
            finance: { title: 'Finance, Growth & Decay', desc: 'Annuities and sinking funds.', icon: 'fa-solid fa-sack-dollar', color: '#f59e0b', lessons: [{ title: 'Future Value Annuities', formula: { tex: '\\[ F = \\frac{x[(1 + i)^n - 1]}{i} \\]', label: 'Future Value Formula' }, explanation: 'Used for regular savings.', steps: ['Identify payment \\(x\\), rate \\(i\\), and periods \\(n\\).'] }] },
            trigonometry: { title: 'Trigonometry', desc: 'ASTC diagram, double & compound angles.', icon: 'fa-solid fa-compass-drafting', color: '#8b5cf6', lessons: [{ title: 'The ASTC Diagram', formula: { tex: '\\[ \\text{CAST Diagram} \\]', label: 'Signs' }, explanation: 'Identify which trig ratios are positive.', steps: ['Q1: All, Q2: Sin, Q3: Tan, Q4: Cos.'] }] },
            analytical_geometry: { title: 'Analytical Geometry', desc: 'Circles and tangents.', icon: 'fa-solid fa-drafting-compass', color: '#0ea5e9', lessons: [{ title: 'Equation of a Circle', formula: { tex: '\\[ (x - a)^2 + (y - b)^2 = r^2 \\]', label: 'Standard Form' }, explanation: 'Circle with centre (a, b) and radius r.', steps: ['Identify center and radius.'] }] },
            euclidean_geometry: { title: 'Euclidean Geometry', desc: 'Circle theorems and proportionality.', icon: 'fa-solid fa-shapes', color: '#10b981', lessons: [{ title: 'Circle Theorems', formula: { tex: '\\[ \\angle \\text{ at centre} = 2 \\times \\angle \\text{ at circumference} \\]', label: 'Core Theorem' }, explanation: 'Key properties for proofs.', steps: ['Angle in semi-circle is 90.'] }] },
            calculus: { title: 'Differential Calculus', desc: 'First principles and power rules.', icon: 'fa-solid fa-infinity', color: '#ec4899', lessons: [{ title: 'First Principles', formula: { tex: '\\[ f\' (x)=\\lim_{h \\to 0} \\frac{f(x+h) - f(x)}{h} \\]', label: 'Definition' }, explanation: 'Formal definition of derivative.', steps: ['Apply limit definition.'] }] },
            probability: { title: 'Counting & Probability', desc: 'Factorials and Venn diagrams.', icon: 'fa-solid fa-dice', color: '#eab308', lessons: [{ title: 'Counting Principle', formula: { tex: '\\[ n! \\]', label: 'Arrangements' }, explanation: 'Calculate arrangements.', steps: ['Use factorials for ordering.'] }] },
            statistics: { title: 'Statistics', desc: 'Regression and correlation.', icon: 'fa-solid fa-chart-line', color: '#f59e0b', lessons: [{ title: 'Regression Line', formula: { tex: '\\[ \\hat{y} = a + bx \\]', label: 'Best Fit' }, explanation: 'Calculate trend line.', steps: ['Find a and b using STAT mode.'] }] }
        };

        const params = new URLSearchParams(window.location.search);
        const selectedTopic = params.get('t');

        function renderTopicsList() {
            const container = document.getElementById('topicContent');
            container.innerHTML = `
            <h1 class="section-title">All Topics</h1>
            <p class="section-subtitle">Choose a topic to explore lessons.</p>
            <div class="topics-list-page">
                ${Object.entries(topicsMeta).map(([key, t]) => `
                <a href="topics.html?t=${key}" class="topics-list-card">
                    <div class="topics-list-card__bar" style="background:${t.color};"></div>
                    <div class="topics-list-card__icon" style="background:${t.color}15;color:${t.color};"><i class="${t.icon}"></i></div>
                    <h3 class="topics-list-card__title">${t.title}</h3>
                    <p class="topics-list-card__count">${t.lessons.length} lesson${t.lessons.length > 1 ? 's' : ''}</p>
                </a>`).join('')}
            </div>`;
        }

        function renderTopicDetail(key) {
            const topic = topicsMeta[key];
            if (!topic) { renderTopicsList(); return; }
            const container = document.getElementById('topicContent');
            container.innerHTML = `
            <a href="topics.html" style="display:flex;align-items:center;gap:0.5rem;color:var(--text-secondary);text-decoration:none;margin-bottom:1rem;">
                <i class="fa-solid fa-arrow-left"></i> All Topics
            </a>
            <h1>${topic.title}</h1>
            <p>${topic.desc}</p>
            ${topic.lessons.map((lesson, li) => `
                <div class="lesson-card">
                    <div class="lesson-card__header" onclick="toggleLesson(this)">
                        <span>${lesson.title}</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="lesson-card__body">
                        ${lesson.formula ? `<div class="formula-box">\\(${lesson.formula.tex}\\)</div>` : ''}
                        <p>${lesson.explanation}</p>
                        ${lesson.visual || ''}
                        <div class="steps-list">
                            ${lesson.steps.map(s => `<div class="step-item">${s}</div>`).join('')}
                        </div>
                    </div>
                </div>`).join('')}
            `;
            renderMath(container);
        }

        window.toggleLesson = function (header) {
            header.parentElement.classList.toggle('open');
        };

        if (selectedTopic) renderTopicDetail(selectedTopic);
        else renderTopicsList();
    </script>
</body>

</html>
