name: mathgrade12
description: TotalSkillz - Grade 12 Mathematics Learning App
publish_to: 'none'
version: 2.4.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  google_sign_in: ^7.2.0

  # Navigation
  go_router: ^17.1.0

  # State Management
  provider: ^6.1.2

  # Math Rendering (replaces KaTeX)
  flutter_math_fork: ^0.7.2

  # PDF Viewer (for exam papers)
  pdfx: ^2.9.0

  # Local storage (replaces localStorage)
  shared_preferences: ^2.3.5

  # UI Utilities
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  url_launcher: ^6.3.1

dependency_overrides:
  path_provider_android: 2.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/questions.json
    - assets/examiner_data.json
    - assets/masterclass_data.json
    - assets/topics_lessons.json
    - assets/logo.jpg

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
